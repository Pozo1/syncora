<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0d0d0d;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.phone{
width:360px;
height:740px;
background:#121212;
border-radius:40px;
border:10px solid #2b2b2b;
overflow:hidden;
position:relative;
box-shadow:0 0 40px rgba(0,0,0,0.6);
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.header{
background:#1db954;
padding:60px 20px 20px 20px;
display:flex;
align-items:center;
gap:12px;
color:white;
font-weight:bold;
font-size:18px;
}

.header img{
width:48px;
height:48px;
border-radius:50%;
object-fit:cover;
border:2px solid white;
}

.status{
font-size:13px;
opacity:0.9;
margin-top:2px;
}

.chat{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
overflow-y:auto;
height:540px;
}

.message{
background:#2a2a2a;
padding:14px;
border-radius:18px;
max-width:80%;
color:white;
line-height:1.5;
animation:messageFade 0.4s ease;
}

@keyframes messageFade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.user{
background:#1db954;
align-self:flex-end;
}

.input{
position:absolute;
bottom:20px;
left:20px;
right:20px;
display:flex;
gap:10px;
}

.input input{
flex:1;
padding:14px;
border:none;
border-radius:16px;
background:#2a2a2a;
color:white;
font-size:15px;
}

.input button{
padding:14px 18px;
border:none;
border-radius:16px;
background:#1db954;
color:white;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.typing{
font-size:12px;
color:#888;
margin-left:6px;
margin-top:-5px;
}

</style>

</head>

<body>

<div class="phone">

<div class="header">

<img src="{{ match.photo }}">

<div>

<div>

{{ match.name }}

</div>

<div class="status">

🎵 ouvindo {{ match.music }}

</div>

</div>

</div>

<div class="chat">

<div class="message">

🎵 Também amo {{ match.music }} 😭🔥

</div>

<div class="message user">

Seu gosto musical é perfeito

</div>

<div class="message">

Vi que temos vários artistas em comum 👀

</div>

<div class="message user">

Qual seu álbum favorito?

</div>

<div class="message">

After Hours sem dúvidas 😭

</div>

<div class="message user">

CASA COMIGO

</div>

<div class="typing">

{{ match.name }} está digitando...

</div>

</div>

<div class="input">

<input
type="text"
placeholder="Digite uma mensagem..."
>

<button>

➤

</button>

</div>

</div>

</body>
</html>
