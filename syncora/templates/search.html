{% extends "base.html" %}
{% block content %}
<div id="tutorial-container" style="height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; background: radial-gradient(circle at center, #0a1f0a 0%, #000 80%);">
    
    <div class="tutorial-visual" style="width: 200px; height: 200px; position: relative; margin-bottom: 50px;">
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: #1db954; border-radius: 50%; box-shadow: 0 0 20px #1db954; z-index: 2;"></div>
        
        <div class="demo-particle"></div>
        
        <div class="tutorial-hand">👆</div>
        
        <div class="pulse-ring"></div>
    </div>

    <div style="animation: fadeInUp 0.8s ease;">
        <h2 style="font-size: 28px; font-weight: 900; color: white; margin-bottom: 15px; letter-spacing: -1px;">Gravidade Musical</h2>
        <p style="color: #888; font-size: 16px; line-height: 1.5; margin-bottom: 40px; font-weight: 500;">
            No Syncora, as pessoas orbitam sua energia. <br>
            <span style="color: #1db954; font-weight: 700;">Arraste uma frequência</span> para o seu centro para sintonizar a conexão.
        </p>
    </div>

    <button onclick="startDiscovery()" class="start-btn">
        Explorar Órbitas
    </button>

    <div style="margin-top: 30px; display: flex; align-items: center; gap: 8px; opacity: 0.5;">
        <span class="live-dot"></span>
        <span style="color: #fff; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px;">Radar Ativo</span>
    </div>

</div>

<style>
    /* Estilos de Animação do Tutorial */
    .demo-particle {
        position: absolute; top: 50%; left: 50%; width: 35px; height: 35px;
        background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
        border-radius: 50%; animation: demoOrbit 4s infinite linear;
    }

    .tutorial-hand {
        position: absolute; font-size: 40px; z-index: 10;
        animation: demoDrag 4s infinite ease-in-out;
    }

    .pulse-ring {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 50px; height: 50px; border: 2px solid #1db954; border-radius: 50%;
        animation: ringExpand 2s infinite;
    }

    /* Keyframes Didáticos */
    @keyframes demoOrbit {
        0% { transform: rotate(0deg) translateX(80px) rotate(0deg); }
        50% { transform: rotate(180deg) translateX(80px) rotate(-180deg); }
        100% { transform: rotate(180deg) translateX(80px) rotate(-180deg); } /* Pausa para o arrasto */
    }

    @keyframes demoDrag {
        0%, 40% { transform: translate(100px, 40px); opacity: 0; }
        50% { transform: translate(100px, 40px); opacity: 1; }
        70% { transform: translate(0, 0); opacity: 1; }
        90%, 100% { transform: translate(0, 0); opacity: 0; }
    }

    @keyframes ringExpand {
        0% { width: 50px; height: 50px; opacity: 1; }
        100% { width: 150px; height: 150px; opacity: 0; }
    }

    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Botão Elite */
    .start-btn {
        width: 100%; padding: 22px; background: #1db954; color: black; border: none;
        border-radius: 50px; font-weight: 900; font-size: 16px; text-transform: uppercase;
        letter-spacing: 2px; cursor: pointer; transition: 0.3s;
        box-shadow: 0 15px 35px rgba(29, 185, 84, 0.2);
    }
    .start-btn:hover { transform: translateY(-3px); box-shadow: 0 20px 45px rgba(29, 185, 84, 0.4); }

    .live-dot { width: 6px; height: 6px; background: #ff3b30; border-radius: 50%; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>

<script>
    function startDiscovery() {
        // Adiciona um efeito sonoro ou vibração aqui se quiser ser mais "Premium"
        if (window.navigator.vibrate) window.navigator.vibrate(50);
        
        window.location.href = "/discover_list";
    }
</script>
{% endblock %}
