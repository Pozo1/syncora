{% extends "base.html" %}
{% block content %}
<div style="padding: 40px; text-align: center; display: flex; flex-direction: column; height: 100%; justify-content: space-between; background: linear-gradient(180deg, rgba(29,185,84,0.05) 0%, rgba(0,0,0,1) 100%);">
    
    <div style="margin-top: 60px;">
        <div style="width: 100px; height: 100px; background: linear-gradient(135deg, #1db954, #1ed760); border-radius: 28px; margin: 0 auto 30px; display: flex; align-items: center; justify-content: center; box-shadow: 0 20px 40px rgba(29, 185, 84, 0.3); animation: float 4s infinite ease-in-out;">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="white">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
        </div>
        
        <h1 style="color: white; font-size: 44px; font-weight: 900; letter-spacing: -2px; margin-bottom: 15px; line-height: 1;">Syncora</h1>
        <p style="color: #a7a7a7; font-size: 17px; line-height: 1.5; padding: 0 20px; font-weight: 400;">
            Conecte-se com pessoas reais através da música e geolocalização.
        </p>
    </div>

    <div style="margin-bottom: 50px;">
        <a href="/login" style="display: block; background: #1db954; color: black; text-decoration: none; padding: 22px; border-radius: 50px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; font-size: 15px; transition: 0.3s; box-shadow: 0 15px 30px rgba(29, 185, 84, 0.2);" onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
            Entrar com Spotify
        </a>
        <p style="color: #444; font-size: 11px; margin-top: 25px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
            Powered by Spotify Web API
        </p>
    </div>
</div>

<style>
    @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(5deg); }
    }
</style>
{% endblock %}
